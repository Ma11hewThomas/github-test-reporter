name: ai-example
run-name: ${{ github.workflow }}_${{ github.ref_name }}_${{ github.run_number }}.${{ github.run_attempt }}

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  testing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install dependencies
        run: npm install
      - name: Build
        run: npm run build
      - name: Test ai reportv
        run: node dist/core/cli.js ai ctrf-reports/ctrf-report.json --title "AI Summary" --pull-request --overwrite-comment --comment-tag "${{ github.workflow }}-${{ github.job }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Test ai reportv
        run: node dist/core/cli.js historical ctrf-reports/ctrf-report.json --title "AI Summary" --pull-request --overwrite-comment --comment-tag "${{ github.workflow }}-${{ github.job }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: ctrf-report
          path: ctrf-reports/ctrf-report.json
      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: custom-artifact-name
          path: ctrf-reports/ctrf-report-no-fails.json
